server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS (127.0.0.11) resolves the "backend" service name
    # to one A record per running replica. Using a variable in proxy_pass
    # (instead of a bare proxy_pass http://backend:3000) forces nginx to
    # re-resolve on every `valid` interval rather than caching the first IP
    # forever — this is what makes `docker compose up -d --scale backend=N`
    # actually spread traffic across replicas instead of pinning to one.
    resolver 127.0.0.11 valid=10s;

    # CLAUDE.md: CORS locked, helmet(-equivalent) hardening. helmet() in the
    # NestJS backend only decorates the API's JSON responses — this nginx is
    # what actually serves the browser-rendered SPA, so it's the layer that
    # needs the real security headers/CSP. The CSP below is safe because
    # nothing in this app loads a third-party script/style/font (Vazirmatn
    # is bundled via @fontsource, not a CDN) — everything is same-origin.
    set $csp "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; worker-src 'self'; manifest-src 'self'; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self'";

    # Backend API routes proxied through the SAME origin as the frontend —
    # keeps auth cookies same-site (no SameSite/CORS headaches) and means
    # the frontend build never needs to know the server's IP/domain
    # (VITE_API_URL is empty, so its fetch calls are plain relative paths).
    # This list must stay in sync with backend/src/modules/**/*.controller.ts
    # top-level @Controller() prefixes.
    # The bare /club URL is the PUBLIC React page (باشگاه مشتریان) — exact
    # match outranks the API regex below, so only /club/... subpaths
    # (members, card-requests, …) reach the backend.
    location = /club {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Content-Security-Policy $csp always;
        try_files /index.html =404;
    }

    location ~ ^/(admins|agencies|agency-portal|audit|auth|bookings|cartable|club|files|flights|it|manager-messages|my|panels|passenger-reports|pricing|referrals|refunds|reporting|reservation|search|settings|staff-reports|health|docs|docs-json)(/|$) {
        # No CSP here: /docs (Swagger UI) needs its own inline script/style
        # allowances that would conflict with the strict SPA policy above,
        # and JSON API responses never execute as HTML anyway.
        include /etc/nginx/snippets/security-headers.conf;
        set $backend_upstream http://backend:3000;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback — every unmatched path serves index.html so React Router
    # (both the public site and /panel, /agency client-side routes) works
    # on a hard refresh or a direct link.
    location / {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Content-Security-Policy $csp always;
        try_files $uri $uri/ /index.html;
    }

    # Service worker / manifest must never be cached long — PWA update flow
    # depends on the browser re-fetching sw.js promptly.
    location = /sw.js {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Content-Security-Policy $csp always;
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }
    location = /manifest.webmanifest {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location /assets/ {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
