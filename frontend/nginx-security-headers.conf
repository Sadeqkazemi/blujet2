# Included in every location block — nginx's add_header does NOT inherit
# from the server block into a location that defines its own add_header
# (a well-known nginx gotcha), so this is `include`d everywhere instead of
# relying on inheritance. Lives outside conf.d/ (referenced by absolute
# path from the Dockerfile's COPY) so it is never auto-globbed as its own
# top-level server config.
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
